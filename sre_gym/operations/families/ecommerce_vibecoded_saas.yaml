# Max tier reference family — vibe-coded e-commerce SaaS
#
# This file is the family-level spec. A "family" is a topology-shaped scenario
# population: one e-commerce stack with payments + inventory + auth, ~30-50
# scenario instances composed from the chaos library
# (sre_gym/max/chaos/ecommerce_chaos_library.yaml).
#
# An instance is materialized at reset() by combining a baseline state with a
# selection of one or more chaos patterns. This is conceptually identical to
# Litmus or Chaos Mesh's "experiments", but composed at the scenario level
# rather than the cluster-bootstrap level.

id: ecommerce_vibecoded_saas
tier: max
name: Vibe-Coded E-commerce SaaS
description: >-
  A faithful reproduction of the failure surface of a 2025-26 vibe-coded
  SaaS: Vercel frontend + Vercel edge functions + Supabase Postgres with RLS
  + Stripe webhooks + worker pool + Redis cache + S3 static assets +
  PostHog/Sentry observability. The agent's actions hit real APIs against a
  sandboxed docker-compose copy; a reset() spins up a fresh stack, applies a
  selected chaos experiment, and lets the agent attempt to recover.
  All actions are reversible at the cluster level (the cluster is destroyed
  on next reset), but irreversible at the application layer (a real Stripe
  refund is a real Stripe refund).

# 22-service realistic topology. Each service is provisioned as a real
# docker-compose container (or HF Space, for the external services that we
# proxy through a sandboxed stub server).
topology:
  services:
    - {id: vercel-frontend,      kind: edge,        provisioned_by: docker-compose, image: ghcr.io/sre-gym/vercel-stub:1.0}
    - {id: vercel-edge-fn,       kind: edge,        provisioned_by: docker-compose, image: ghcr.io/sre-gym/vercel-edge-stub:1.0}
    - {id: api-gateway,          kind: bff,         provisioned_by: docker-compose, image: ghcr.io/sre-gym/api-gateway:1.0}
    - {id: orders-service,       kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/orders:1.0}
    - {id: payments-service,     kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/payments:1.0}
    - {id: inventory-service,    kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/inventory:1.0}
    - {id: shipping-service,     kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/shipping:1.0}
    - {id: notifications,        kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/notifications:1.0}
    - {id: search-service,       kind: backend,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/search:1.0}
    - {id: worker-orders,        kind: worker,      provisioned_by: docker-compose, image: ghcr.io/sre-gym/worker-orders:1.0}
    - {id: worker-payments,      kind: worker,      provisioned_by: docker-compose, image: ghcr.io/sre-gym/worker-payments:1.0}
    - {id: worker-fulfilment,    kind: worker,      provisioned_by: docker-compose, image: ghcr.io/sre-gym/worker-fulfilment:1.0}
    - {id: postgres-primary,     kind: database,    provisioned_by: docker-compose, image: postgres:16, supabase_compat: true}
    - {id: postgres-replica,     kind: database,    provisioned_by: docker-compose, image: postgres:16}
    - {id: redis-sessions,       kind: cache,       provisioned_by: docker-compose, image: redis:7}
    - {id: redis-jobs,           kind: cache,       provisioned_by: docker-compose, image: redis:7}
    - {id: kafka-events,         kind: queue,       provisioned_by: docker-compose, image: confluentinc/cp-kafka:7.5}
    - {id: stripe-stub,          kind: external,    provisioned_by: docker-compose, image: ghcr.io/sre-gym/stripe-stub:1.0}
    - {id: supabase-auth-stub,   kind: external,    provisioned_by: docker-compose, image: ghcr.io/sre-gym/supabase-auth-stub:1.0}
    - {id: posthog-stub,         kind: external,    provisioned_by: docker-compose, image: ghcr.io/sre-gym/posthog-stub:1.0}
    - {id: sentry-stub,          kind: external,    provisioned_by: docker-compose, image: ghcr.io/sre-gym/sentry-stub:1.0}
    - {id: chaos-controller,     kind: control,     provisioned_by: docker-compose, image: ghcr.io/sre-gym/chaos-controller:1.0}

# Workload generator simulates organic traffic against the topology so the
# agent's recovery decisions are scored under realistic load.
workload_generator:
  enabled: true
  shape: poisson
  rates:
    /api/products/list:        {rps: 80,  pattern: diurnal}
    /api/cart/add:             {rps: 12,  pattern: diurnal}
    /api/checkout:             {rps:  4,  pattern: diurnal}
    /webhooks/stripe:          {rps:  3,  pattern: bursty}
    /api/orders/list:          {rps: 18,  pattern: diurnal}
  jitter: 0.15

# 30-50 chaos experiments are composed from the chaos library. Each becomes
# a scenario instance.
scenario_population:
  size: 42
  composition_rules:
    - {pattern: deploy_regression,            count: 8}
    - {pattern: dependency_degradation,       count: 6}
    - {pattern: config_rollout,               count: 6}
    - {pattern: retry_storm,                  count: 4}
    - {pattern: migration_lock,               count: 3}
    - {pattern: rls_silent_leak,              count: 3}
    - {pattern: oauth_supply_chain_pivot,     count: 3}
    - {pattern: observability_self_denial,    count: 3}
    - {pattern: secondary_rate_limit,         count: 3}
    - {pattern: cdn_cache_contamination,      count: 2}
    - {pattern: gossip_protocol_deadlock,     count: 1}
  difficulty_distribution: {medium: 0.40, hard: 0.40, very_hard: 0.20}

# 50+ actions. The agent has a sandboxed shell in a sidecar that lets it write
# code, push to a sandboxed git, watch CI, observe deploys.
allowed_actions:
  # Inherits Basic + Advanced action set
  - inherits: [basic, advanced]
  # Max-only: subprocess access
  - shell_exec                    # bounded subprocess access in sandbox
  - git_commit                    # commit a fix to a sandboxed mirror
  - git_push                      # push to sandboxed remote, triggers CI
  - watch_ci                      # observe GitHub Actions / Vercel CI run
  - kubectl_rollout_undo          # real kubectl call against the sandbox cluster
  - kubectl_describe              # raw kubectl describe pod
  - vercel_rollback               # real Vercel API call
  - supabase_policy_apply         # apply a Supabase RLS policy
  - stripe_create_refund          # real Stripe API in sandbox mode
  - terraform_plan                # IaC drift detection
  - terraform_apply               # IaC remediation
  - bisect_commits                # binary-search for the bad commit
  - update_runbook                # write a runbook back to the source-of-truth
  - hotpatch_dependency           # deploy a forked-fixed dependency
  - rollout_canary                # %-based traffic split rollback

# Reward is OUTCOME-scored, not rubric-scored. A second small model evaluates
# the postmortem against the actual recovery trajectory.
reward_model:
  type: outcome_with_critic
  primary_signal: actual_recovery_state          # is the stack actually healthy?
  rubric_dimensions:                             # auxiliary shaping
    mttr:                       {weight: 0.25}
    revenue_lost_during_outage: {weight: 0.15, sign: minus}
    blast_radius:               {weight: 0.10, sign: minus}
    iac_remediation_applied:    {weight: 0.10}
    postmortem_quality:         {weight: 0.10}    # learned-critic eval
    customer_comm:              {weight: 0.05}
    runbook_update:             {weight: 0.10}    # successful resolution writes a runbook
    security_handling:          {weight: 0.10}    # if scenario is security-classified
    chained_incident_recognition: {weight: 0.05}

# Reference instance: ONE concrete scenario from the family, fully specced.
# This is the 'show me one' artifact for skeptical judges.
reference_instance:
  id: stripe_webhook_signature_regression_with_supabase_rls_drift
  description: >-
    A combined chaos experiment: a recent api-gateway deploy broke Stripe
    webhook signature verification (Stripe API version bump 2023-10-16 -> 2024-06-20)
    AND a separate Supabase RLS migration introduced a typo that silently
    leaks subscription-tier data across tenants. The two faults are causally
    independent but became visible at the same time, so the alert page looks
    chaotic. The optimal trajectory contains BOTH faults, fixes the security
    one first (containment), then fixes the reliability one, then drafts a
    postmortem that classifies the security side correctly.
  chaos_patterns_applied:
    - stripe_webhook_signature_regression
    - rls_silent_leak
  expected_optimal_trajectory_length: 110-180 actions
  expected_wall_clock_duration: 25-40 minutes simulated
  expected_optimal_score_band: 0.78-0.88
  human_baseline_score_band: 0.60-0.75   # measured against an experienced SRE

# Operational notes for downstream operators bringing this tier up.
operator_notes:
  cost_estimate: $40-150/day depending on cluster size and chaos cadence
  recommended_hardware: 8x A100/H100 cluster for training a 32B-70B specialist
  isolation_requirements:
    - sandboxed git remote (no production write access)
    - sandboxed Stripe credentials in test mode only
    - sandboxed Supabase project with synthetic data only
    - destructive actions confined to the ephemeral cluster
  reset_safety:
    - cluster is fully destroyed and reprovisioned per reset()
    - chaos_controller refuses to inject patterns marked unsafe in the family spec
    - supabase test project tenants are flushed and reseeded per reset()
